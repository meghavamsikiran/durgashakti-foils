server.port=8012
spring.application.name=catalog-service
spring.datasource.url=jdbc:postgresql://${DB_HOST:aws-0-ap-south-1.pooler.supabase.com}:${DB_PORT:6543}/${DB_NAME:postgres}?sslmode=require&prepareThreshold=0
spring.datasource.username=${DB_USER:postgres.vddtkiefzhcihdzxxlgp}
spring.datasource.password=${DB_PASS:${DB_PASSWORD:}}
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-init-sql=SET timezone = 'UTC'

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

jwt.secret=${JWT_SECRET:YOUR_STRONG_RANDOM_JWT_SECRET_MIN_48_CHARS}
jwt.access-token-minutes=${ACCESS_TOKEN_MINUTES:30}
jwt.refresh-token-days=${REFRESH_TOKEN_DAYS:7}

logging.level.com.durgashakti.catalog=DEBUG
logging.level.org.springframework.security=WARN
