server.port=8010
spring.application.name=auth-service

spring.datasource.url=jdbc:postgresql://${DATABASE_HOST:localhost}:${DATABASE_PORT:5432}/${DATABASE_NAME:durgashakti}?sslmode=${DATABASE_SSL_MODE:require}
spring.datasource.username=${DATABASE_USER:postgres}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false

spring.jackson.property-naming-strategy=SNAKE_CASE
spring.jackson.default-property-inclusion=non_null

spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USER:}
spring.mail.password=${SMTP_PASS:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enabled=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
spring.mail.from=${SMTP_FROM:${SMTP_USER:noreply@durgashaktifoils.com}}
spring.mail.from-name=${EMAIL_FROM_NAME:Durga Shakti Foils}

jwt.secret=${JWT_SECRET:local_dev_only_ds_foils_jwt_secret_change_me}
jwt.expiration-hours=${JWT_EXPIRATION_HOURS:168}

app.environment=${ENVIRONMENT:development}

logging.level.com.durgashakti=DEBUG
logging.level.org.springframework.security=INFO
