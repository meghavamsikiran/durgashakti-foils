server.port=8001
spring.application.name=api-gateway
spring.main.web-application-type=reactive

# CORS Configurations
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedOrigins[0]=http://localhost:3000
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedOrigins[1]=http://localhost:3001
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedOrigins[2]=http://127.0.0.1:3000
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedOrigins[3]=http://127.0.0.1:3001
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedOrigins[4]=https://durgashakti-foils.vercel.app
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedOrigins[5]=https://durgashakti-foils-git-main-meghavamsikirans-projects.vercel.app

spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedMethods[0]=GET
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedMethods[1]=POST
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedMethods[2]=PUT
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedMethods[3]=PATCH
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedMethods[4]=DELETE
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedMethods[5]=OPTIONS
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedMethods[6]=HEAD

spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowCredentials=true
spring.cloud.gateway.globalcors.corsConfigurations.[/**].maxAge=3600

# Default Filters
spring.cloud.gateway.default-filters[0]=DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE

# Routes
# Auth Service
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=http://localhost:8010
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**

# User Service
spring.cloud.gateway.routes[1].id=user-service
spring.cloud.gateway.routes[1].uri=http://localhost:8011
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/user/**

spring.cloud.gateway.routes[2].id=user-service-addresses
spring.cloud.gateway.routes[2].uri=http://localhost:8011
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/addresses/**

# Catalog Service
spring.cloud.gateway.routes[3].id=catalog-service-products
spring.cloud.gateway.routes[3].uri=http://localhost:8012
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/products/**

spring.cloud.gateway.routes[4].id=catalog-service-categories
spring.cloud.gateway.routes[4].uri=http://localhost:8012
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/categories/**

spring.cloud.gateway.routes[5].id=catalog-service-reviews
spring.cloud.gateway.routes[5].uri=http://localhost:8012
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/reviews/**

spring.cloud.gateway.routes[6].id=catalog-service-settings
spring.cloud.gateway.routes[6].uri=http://localhost:8012
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/settings/public

# Order Service
spring.cloud.gateway.routes[7].id=order-service-orders
spring.cloud.gateway.routes[7].uri=http://localhost:8013
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/orders/**

spring.cloud.gateway.routes[8].id=order-service-cart
spring.cloud.gateway.routes[8].uri=http://localhost:8013
spring.cloud.gateway.routes[8].predicates[0]=Path=/api/cart/**

spring.cloud.gateway.routes[9].id=order-service-coupons-validate
spring.cloud.gateway.routes[9].uri=http://localhost:8013
spring.cloud.gateway.routes[9].predicates[0]=Path=/api/coupons/validate

spring.cloud.gateway.routes[10].id=order-service-coupons-available
spring.cloud.gateway.routes[10].uri=http://localhost:8013
spring.cloud.gateway.routes[10].predicates[0]=Path=/api/coupons/available

# Admin Service
spring.cloud.gateway.routes[11].id=admin-service
spring.cloud.gateway.routes[11].uri=http://localhost:8014
spring.cloud.gateway.routes[11].predicates[0]=Path=/api/admin/**

spring.cloud.gateway.routes[12].id=admin-service-analytics
spring.cloud.gateway.routes[12].uri=http://localhost:8014
spring.cloud.gateway.routes[12].predicates[0]=Path=/api/analytics/**

spring.cloud.gateway.routes[13].id=admin-service-contacts
spring.cloud.gateway.routes[13].uri=http://localhost:8014
spring.cloud.gateway.routes[13].predicates[0]=Path=/api/contacts/**

spring.cloud.gateway.routes[14].id=admin-service-support-tickets
spring.cloud.gateway.routes[14].uri=http://localhost:8014
spring.cloud.gateway.routes[14].predicates[0]=Path=/api/support-tickets/**

spring.cloud.gateway.routes[15].id=admin-service-pincode
spring.cloud.gateway.routes[15].uri=http://localhost:8014
spring.cloud.gateway.routes[15].predicates[0]=Path=/api/pincode/**

spring.cloud.gateway.routes[16].id=admin-service-serviceability
spring.cloud.gateway.routes[16].uri=http://localhost:8014
spring.cloud.gateway.routes[16].predicates[0]=Path=/api/serviceability/**

# Notification Service
spring.cloud.gateway.routes[17].id=notification-service
spring.cloud.gateway.routes[17].uri=http://localhost:8015
spring.cloud.gateway.routes[17].predicates[0]=Path=/api/notifications/**

# Logging
logging.level.org.springframework.cloud.gateway=INFO
logging.level.com.durgashakti.gateway=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Management
management.endpoints.web.exposure.include=health,info,gateway
management.endpoint.gateway.enabled=true
