server.port=8013
spring.application.name=order-service

spring.datasource.url=jdbc:postgresql://${DB_HOST:aws-0-ap-south-1.pooler.supabase.com}:${DB_PORT:6543}/${DB_NAME:postgres}?sslmode=require&prepareThreshold=0
spring.datasource.username=${DB_USER:postgres.vddtkiefzhcihdzxxlgp}
spring.datasource.password=${DB_PASS:}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-init-sql=SET timezone = 'UTC'

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false

jwt.secret=${JWT_SECRET:YOUR_STRONG_RANDOM_JWT_SECRET_MIN_48_CHARS}

razorpay.key-id=${RAZORPAY_KEY_ID:fake_key_id}
razorpay.key-secret=${RAZORPAY_KEY_SECRET:fake_key_secret}
razorpay.webhook-secret=${RAZORPAY_WEBHOOK_SECRET:fake_webhook_secret}

logging.level.com.durgashakti=DEBUG
logging.level.org.springframework.security=WARN
