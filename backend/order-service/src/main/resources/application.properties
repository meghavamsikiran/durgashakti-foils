server.port=8013
spring.application.name=order-service

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:postgres}?sslmode=${DB_SSL_MODE:require}&prepareThreshold=0
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:${DB_PASSWORD:}}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-init-sql=SET timezone = 'UTC'

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false

jwt.secret=${JWT_SECRET:local_dev_only_ds_foils_jwt_secret_change_me}

razorpay.key-id=${RAZORPAY_KEY_ID:fake_key_id}
razorpay.key-secret=${RAZORPAY_KEY_SECRET:fake_key_secret}
razorpay.webhook-secret=${RAZORPAY_WEBHOOK_SECRET:fake_webhook_secret}

logging.level.com.durgashakti=DEBUG
logging.level.org.springframework.security=WARN
