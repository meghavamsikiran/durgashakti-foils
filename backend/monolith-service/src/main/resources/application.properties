spring.profiles.active=combined
spring.application.name=durgashakti-backend-service
spring.main.allow-bean-definition-overriding=true
server.port=${PORT:8080}

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:postgres}?sslmode=${DB_SSL_MODE:require}&prepareThreshold=0
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:${DB_PASSWORD:}}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-init-sql=SET timezone = 'UTC'

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

jwt.secret=${JWT_SECRET:local_dev_only_ds_foils_jwt_secret_change_me}
jwt.access-token-minutes=${ACCESS_TOKEN_MINUTES:30}
jwt.refresh-token-days=${REFRESH_TOKEN_DAYS:7}

razorpay.key-id=${RAZORPAY_KEY_ID:fake_key_id}
razorpay.key-secret=${RAZORPAY_KEY_SECRET:fake_key_secret}
razorpay.webhook-secret=${RAZORPAY_WEBHOOK_SECRET:fake_webhook_secret}

email.service.url=http://localhost:8080/api/email/send

# Enable fallback to Mock email sender if SMTP keys are missing
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USER:noreply@durgashaktifoils.com}
spring.mail.password=${SMTP_PASS:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

spring.jackson.property-naming-strategy=SNAKE_CASE
