server.port=8011
spring.application.name=user-service

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/durgashakti}
spring.datasource.username=${DATABASE_USER:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

spring.jackson.property-naming-strategy=SNAKE_CASE
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=always

jwt.secret=${JWT_SECRET:local_dev_only_ds_foils_jwt_secret_change_me}
jwt.expiration-hours=168

logging.level.com.durgashakti=DEBUG
logging.level.org.springframework.security=WARN
