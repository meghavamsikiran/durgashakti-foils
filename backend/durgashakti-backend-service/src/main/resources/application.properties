spring.profiles.active=combined
spring.application.name=durgashakti-backend-service
spring.main.allow-bean-definition-overriding=true
server.port=${PORT:8080}

spring.datasource.url=jdbc:postgresql://${DB_HOST:aws-0-ap-south-1.pooler.supabase.com}:${DB_PORT:6543}/${DB_NAME:postgres}?sslmode=require&prepareThreshold=0
spring.datasource.username=${DB_USER:postgres.vddtkiefzhcihdzxxlgp}
spring.datasource.password=${DB_PASS:}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

jwt.secret=${JWT_SECRET:local_dev_only_ds_foils_jwt_secret_change_me}
jwt.access-token-minutes=${ACCESS_TOKEN_MINUTES:30}
jwt.refresh-token-days=${REFRESH_TOKEN_DAYS:7}

razorpay.key-id=${RAZORPAY_KEY_ID:fake_key_id}
razorpay.key-secret=${RAZORPAY_KEY_SECRET:fake_key_secret}
razorpay.webhook-secret=${RAZORPAY_WEBHOOK_SECRET:fake_webhook_secret}

notification.service.url=http://localhost:8080/api/notifications/dispatch

# Enable fallback to Mock email sender if SMTP keys are missing
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USER:noreply@durgashaktifoils.com}
spring.mail.password=${SMTP_PASS:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
